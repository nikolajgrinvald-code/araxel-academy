{% extends 'base.html' %}
{% block content %}
<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:18px">
  <div>
    <h1 class="brand" style="font-size:1.8rem">Мои программы</h1>
    <p class="muted">Доступные образовательные轨迹</p>
  </div>
</div>
<div class="list-grid cards-hover">
  {% for e in enrollments %}
    <a href="{% url 'course_detail' e.course.id %}" class="card">
      <h3 class="brand" style="margin:0 0 10px">{{ e.course.title }}</h3>
      <p class="muted">{{ e.course.description }}</p>
      <span class="badge" style="margin-top:12px;display:inline-flex">{{ e.access_status }}</span>
    </a>
  {% empty %}
    <p class="muted">Пока пусто.</p>
  {% endfor %}
</div>
{% endblock %}
