{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:860px;margin:0 auto">
  <div class="brand" style="font-size:1.6rem">Отправить ответ</div>
  <p class="muted" style="margin-top:6px">Задание: {{ lesson.title }}</p>

  <form method="post" enctype="multipart/form-data" style="margin-top:18px">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" style="margin-top:18px;width:100%" type="submit">Отправить</button>
  </form>
</div>
{% endblock %}
